# Self-hosted Prefect stack for the digitalization pipeline.
#
#   docker compose -f deploy/docker-compose.prefect.yml up -d postgres prefect-server
#   docker compose -f deploy/docker-compose.prefect.yml up -d worker
#
# The UI is then on http://<vm>:4200. The worker image bundles the full
# toolchain (scantailor-cli, tesseract, recode_pdf) from the project Dockerfile.
# Settings come from deploy/.env (copy from deploy/.env.example).

name: evilflowers-digitalizer

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prefect}
      POSTGRES_DB: prefect
    volumes:
      - prefect-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  prefect-server:
    image: prefecthq/prefect:3-latest
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:${POSTGRES_PASSWORD:-prefect}@postgres:5432/prefect
      PREFECT_UI_API_URL: ${PREFECT_UI_API_URL:-http://localhost:4200/api}
    ports:
      - "4200:4200"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Worker: pulls runs from the process work pool and executes them. Built from
  # the project Dockerfile so it carries the imaging toolchain. The raw-scans
  # mount, configs and output are bind-mounted in.
  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    image: evilflowers-digitalizer:latest
    command: >
      sh -c "prefect work-pool create --type process ${PREFECT_WORK_POOL:-digitizer-pool} --overwrite &&
             prefect worker start --pool ${PREFECT_WORK_POOL:-digitizer-pool}"
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
    volumes:
      - ${RAW_SCANS_MOUNT:-/mnt/digital-library/raw-scans}:/mnt/digital-library/raw-scans:ro
      - ../configs:/app/configs:ro
      - ${OUTPUT_DIR:-../output}:/app/output
      - ${CACHE_DIR:-../.cache}:/app/.cache
    depends_on:
      prefect-server:
        condition: service_started
    restart: unless-stopped

volumes:
  prefect-db:
