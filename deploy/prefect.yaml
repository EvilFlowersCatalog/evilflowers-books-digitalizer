# Prefect deployments for the digitalization corpus.
#
# Apply them (after the server + a work pool exist):
#   prefect --no-prompt deploy --all --prefect-file deploy/prefect.yaml
# or via the CLI helper:
#   python -m evilflowers_books_digitalizer serve
#
# Then trigger a run from the UI or:
#   prefect deployment run 'digitize-source/svf'
#   prefect deployment run 'digitize-corpus/full-corpus'

prefect-version: 3.0.0

deployments:
  - name: by-source
    entrypoint: evilflowers_books_digitalizer/orchestration/flows.py:digitize_source
    description: Digitize one faculty's books under a concurrency limit.
    work_pool:
      name: digitizer-pool
    parameters:
      source_key: svf

  - name: full-corpus
    entrypoint: evilflowers_books_digitalizer/orchestration/flows.py:digitize_corpus
    description: Digitize every configured faculty in sequence.
    work_pool:
      name: digitizer-pool
    # Schedule disabled by default — trigger manually for a one-shot mass run.
    # schedules:
    #   - cron: "0 2 * * 6"   # Saturdays 02:00, if you want it recurring
