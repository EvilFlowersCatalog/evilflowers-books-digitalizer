name: Docker

# Build the full tooling image (scantailor-deviant-cli, jbig2enc, tesseract,
# recode_pdf, DocRes). On pull requests we only build (no push) and skip the
# ~900 MB DocRes weights to keep CI fast. On master and tags we build the full
# image and push it to GitHub Container Registry (GHCR).

on:
  push:
    branches: [master, main]
    tags: ["v*"]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "pyproject.toml"
      - "poetry.lock"
      - "evilflowers_books_digitalizer/**"
      - "configs/**"
      - ".github/workflows/docker.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "pyproject.toml"
      - "evilflowers_books_digitalizer/**"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      # Only log in / push for non-PR events (PRs from forks have no push rights).
      - name: Log in to GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          # PRs build a lean image (skip DocRes weights); real builds bake them in.
          build-args: |
            DOCRES_WEIGHTS=${{ github.event_name == 'pull_request' && '0' || '1' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
