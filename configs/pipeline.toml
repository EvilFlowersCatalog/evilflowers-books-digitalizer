# Production transformation settings.
#
# engine = "scantailor_mrc" (default since 2026-06-07, prototyped in notebook 06):
#   ScanTailor cleanup [-> DocRes] -> Tesseract hOCR -> MRC PDF.
#   On the fad sample vs legacy: uniform page sizes + real margins, bleed-through
#   gone, 10.1 MB -> 1.8 MB, OCR words 6364 -> 6725.
# engine = "legacy": OpenCV preprocess -> img2pdf -> OCRmyPDF
#   (settings in [preprocess] / [ocr], chosen in notebook 03, 2026-06-06).

[pipeline]
engine = "scantailor_mrc"

# --- production runtime (consumed by runtime.load_runtime / the CLI / Prefect) ---

[paths]
# Relative paths resolve against the project root. On the VM, point output_dir
# at durable storage and cache_dir at fast local scratch.
cache_dir = ".cache"
output_dir = "output"

[source]
# backend = "filesystem": read the raw scans off a local mount (production).
# backend = "webdav": pull over WebDAV (dev; needs credentials.toml + VPN).
backend = "filesystem"
root = "/mnt/digital-library/raw-scans"
# stage_mode: "symlink" (zero-copy, default), "copy", or "hardlink".
stage_mode = "symlink"
# Faculty key -> directory under `root` that holds the book directories.
[source.paths]
fad = "fad/FA-skeny"
fei = "fei/FEI-skeny"
mtf = "mtf/MTF-skeny"
sjf = "sjf/SJF-skeny"
svf = "svf/SVF-skeny"

[metadata]
# Excel catalog mapped to books by directory name (see metadata/catalog.py).
enabled = true
excel_path = "configs/catalog.xlsx"
sheet = 0
# Which canonical field is used to match the directory id (usually the ISBN).
key_field = "isbn"
# Canonical field -> spreadsheet column header. Adjust to the real sheet;
# missing columns are simply skipped.
[metadata.columns]
title = "title"
authors = "authors"
year = "year"
publisher = "publisher"
isbn = "isbn"
faculty = "faculty"
language = "language"
# Source key -> human faculty name (used on covers and for unmatched stubs).
[metadata.faculty_names]
fad = "Fakulta architektúry a dizajnu STU"
fei = "Fakulta elektrotechniky a informatiky STU"
mtf = "Materiálovotechnologická fakulta STU"
sjf = "Strojnícka fakulta STU"
svf = "Stavebná fakulta STU"

[cover]
# Standalone thumbnail per book (<slug>.cover.jpg); the PDF is left untouched.
enabled = true
template = "banner"          # "banner" | "minimal"
format = "JPEG"             # "JPEG" | "PNG"
quality = 88
# size = [1200, 1697]       # default ~ISO 1:√2 book proportion
# Per-faculty palette overrides (hex); faculty key -> {bg, accent, text, ...}.
# [cover.palette.fad]
# accent = "#A8442A"

[orchestration]
# Prefect fan-out limits. max_parallel_books * ocr_jobs should be <= CPU cores.
max_parallel_books = 4
ocr_jobs = 2
min_free_gb = 40
# Mark a source-flow run Failed (-> alert) when this fraction of books error.
fail_on_error_ratio = 0.5
# Faculties to process (order matters for digitize_corpus); defaults to
# [source.paths] keys when omitted.
sources = ["svf", "sjf", "fad", "fei", "mtf"]

[scantailor]
binary = "scantailor-deviant-cli"
# "mixed": text binarized (crisp, kills bleed-through), picture zones keep tones.
# "color_grayscale": tones kept everywhere — pair with [docres] enabled = true.
color_mode = "mixed"
margins_mm = 8.0
dewarping = "auto"
normalize_illumination = true
despeckle = "cautious"
dpi = 300
# supersampled binarization (notebook 07): 600dpi B/W output from 300dpi scans
# gives much smoother glyphs at ~2x the (still small) file size.
output_dpi = 600

[docres]
# AI appearance enhancement (keeps stamp/photo tones; ~2 min/page) — only
# worthwhile with color_mode = "color_grayscale" on covers / photo-heavy books.
enabled = false
repo = "~/.local/share/evilflowers-tools/DocRes"
python = "~/.local/share/evilflowers-tools/venv-docres/bin/python"
task = "appearance"

[mrc]
mask_compression = "jbig2"
jpeg2000_encoder = "pillow"

[ocr]
language = "auto"

[finalize]
# Reading-experience polish (notebook 09): outline bookmarks from hOCR
# headings, /PageLabels from printed page numbers, web-optimized (linearized)
# save. Heuristic and fail-safe — skipped pieces are logged, never fatal.
enabled = true
bookmarks = true
page_labels = true
linearize = true

# --- legacy engine settings (engine = "legacy") ---------------------------
#   - splitting spreads: confidence 83 -> 91, 0.64 -> 0.29 MB/page
#   - color_mode "keep": grayscale costs ~3.5 confidence points for ~4% size
#   - optimize 2: no downside; engages pngquant, and JBIG2 once jbig2enc is installed
#   - whiten: per-channel white balance maps yellowed paper to white

[preprocess]
split = true
deskew = true
whiten = true
color_mode = "keep"

[legacy_ocr]
output_type = "pdfa-2"
optimize = 2
rotate_pages = true
